docker:
  context: default
  sourceImage: source:latest
  runnerImageName: orbital-runner:latest

github:
  org: ExampleOrg
  appId: 0000000
  installationId: 000000000
  pem: ~/.ssh/example.pem

runner:
  group: RunnerGroup
  labels:
    - linux
    - amd64
    - ubuntu24.04
  namePrefix: ubuntu
  count: 3

mount:
  source: /Volumes/Foo
  target: /Volumes/Foo

runtime:
  pollIntervalSeconds: 10